<svg viewBox="48 2 224 290" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    True triquetra: three 300° arcs of circles (R=95) centered at the three
    vertices of an equilateral triangle. Each arc connects two inner crossing
    points and sweeps through an outer tip.
    Centers: A(160,110) top · B(113,192) BL · C(207,192) BR
  -->
  <path
    d="M 113 192 A 95 95 0 1 1 207 192 A 95 95 0 1 1 160 110 A 95 95 0 1 1 113 192 Z"
    stroke="white"
    stroke-width="20"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
