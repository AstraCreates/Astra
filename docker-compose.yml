services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  headroom:
    build:
      context: .
      dockerfile: Dockerfile.headroom
    restart: unless-stopped
    # Headroom can transiently exceed 768 MiB while compressing several
    # concurrent long contexts. Keep a bounded limit, but avoid OOM restart
    # loops that make model calls intermittently unavailable.
    mem_limit: 2g
    memswap_limit: 2g
    pids_limit: 128
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Self-hosted Firecrawl-alternative search+scrape (crw) backing the
  # recursive research replacement for Perplexity Sonar. Published image,
  # not built locally — single static binary, ~50MB idle.
  crw:
    image: ghcr.io/us/crw:latest
    restart: unless-stopped
    depends_on:
      searxng:
        condition: service_healthy
      lightpanda:
        condition: service_started
    environment:
      - RUST_LOG=info
      - CRW_CONFIG=config.docker
    volumes:
      - ./config.docker.toml:/app/config.docker.toml:ro
    mem_limit: 2g
    memswap_limit: 2g
    pids_limit: 512
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # No wget/curl in this image (minimal Debian, read_only rootfs) -- was
      # failing every single check with "wget: not found" (exit 127), so crw
      # never reported healthy and blocked every depends_on: crw recreate
      # downstream (backend, etc). bash's /dev/tcp is a real TCP connect
      # check with no external binary needed -- confirmed bash IS present.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/3000'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Meta-search backend for crw's /v1/search. Not published to the host —
  # only crw talks to it, over the compose bridge network.
  searxng:
    image: searxng/searxng:2026.5.9-0cba32c15
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    memswap_limit: 512m
    pids_limit: 256
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-change-me-with-openssl-rand-hex-32-please}
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
    tmpfs:
      - /tmp:size=64m
      - /var/cache/searxng:size=128m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Lightweight JS renderer for crw (~64MB) — handles most static-JS sites
  # without needing full Chromium.
  lightpanda:
    image: lightpanda/browser:latest
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2g
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9222"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - OBSIDIAN_VAULT=/data/astra_docs
      - ASTRA_WORKSPACE=/data/astra-workspaces
      - ASTRA_HOSTED_SITE_ROOT=/data/astra-workspaces/hosted-sites
      - ASTRA_RELEASE_SHA=${ASTRA_RELEASE_SHA:-development}
      - ASTRA_SERVER_PREVIEW_BASE_URL=${ASTRA_SERVER_PREVIEW_BASE_URL:-https://api.astracreates.com/hosted-preview}
      - AGENT_MODEL_BASE_URL=http://headroom:8787/v1
      - OPENROUTER_BASE_URL=http://headroom:8787/v1
      - TOOLUSE_MODEL_BASE_URL=http://headroom:8787/v1
      - PLANNER_MODEL_BASE_URL=http://headroom:8787/v1
      - CHAT_MODEL_BASE_URL=http://headroom:8787/v1
      - LIGHT_MODEL_BASE_URL=http://headroom:8787/v1
      - CRW_BASE_URL=http://crw:3000
      - HIGHOUTPUT_MODEL_BASE_URL=http://headroom:8787/v1
      - ASTRA_COMPRESSION_THRESHOLD=${ASTRA_COMPRESSION_THRESHOLD:-64000}
      - ASTRA_THREAD_POOL=${ASTRA_THREAD_POOL:-32}
      - WEB_CONCURRENCY=1
    depends_on:
      redis:
        condition: service_healthy
      headroom:
        condition: service_healthy
      crw:
        condition: service_healthy
    mem_limit: 4g
    memswap_limit: 4g
    pids_limit: 512
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5)\""]
      interval: 15s
      timeout: 7s
      retries: 5
      start_period: 45s
    ports:
      - "127.0.0.1:8000:8000"
      - "4000-4009:4000-4009"  # local MVP preview servers (Vercel fallback) — intentionally public, see deploy/nginx.conf
    volumes:
      - ./backend:/app/backend  # live code mount — SCP + restart, no rebuild needed
      - astra_docs_data:/data/astra_docs
      - astra_workspaces_data:/data/astra-workspaces
      - brain_data:/app/.astra

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - BACKEND_URL=http://backend:8000
        - NEXT_PUBLIC_API_URL=/api
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
        - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
        - NEXTAUTH_URL=${NEXTAUTH_URL:-}
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
    restart: unless-stopped
    env_file: .env
    environment:
      - BACKEND_URL=http://backend:8000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const os = require('os'); const ips = Object.values(os.networkInterfaces()).flat().filter(Boolean).filter((entry) => entry.family === 'IPv4' && !entry.internal).map((entry) => entry.address); const host = ips[0] || '127.0.0.1'; fetch('http://' + host + ':3000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 7s
      retries: 5
      start_period: 30s

  windmill-db:
    image: postgres:16
    restart: unless-stopped
    shm_size: 1g
    environment:
      - POSTGRES_PASSWORD=${WM_DB_PASSWORD:-change-me-astra}
      - POSTGRES_DB=windmill
    volumes:
      - windmill_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  windmill-server:
    image: ${WM_IMAGE:-ghcr.io/windmill-labs/windmill:main}
    restart: unless-stopped
    depends_on:
      windmill-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${WM_DATABASE_URL:-postgres://postgres:${WM_DB_PASSWORD:-change-me-astra}@windmill-db/windmill?sslmode=disable}
      - MODE=server
    volumes:
      - windmill_worker_logs:/tmp/windmill/logs

  windmill-worker:
    image: ${WM_IMAGE:-ghcr.io/windmill-labs/windmill:main}
    restart: unless-stopped
    privileged: true
    depends_on:
      windmill-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${WM_DATABASE_URL:-postgres://postgres:${WM_DB_PASSWORD:-change-me-astra}@windmill-db/windmill?sslmode=disable}
      - MODE=worker
      - WORKER_GROUP=default
      - FAVOR_UNSHARE_PID=true
    volumes:
      - windmill_worker_cache:/tmp/windmill/cache
      - windmill_worker_logs:/tmp/windmill/logs

  # ── Wave 1 control plane (PLAN.md) ──────────────────────────────────────
  # Dedicated infrastructure Postgres for Temporal's own persistence (and,
  # later, LiteLLM's database). Completely separate from the app's real
  # product data, which lives in a hosted Supabase project reached over the
  # network via backend/db/client.py -- nothing here touches that.
  # Nothing in the running app talks to any of these services yet.
  temporal-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${TEMPORAL_DB_PASSWORD:-change-me-astra}
      - POSTGRES_DB=temporal
    volumes:
      - temporal_pg_data:/var/lib/postgresql/data
      - ./deploy/temporal-postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Not published to the host — only temporal-worker and temporal-ui talk to
  # it, over the compose bridge network. Browse the UI via an SSH tunnel if
  # a human needs to look at it, never expose it publicly.
  temporal:
    image: temporalio/auto-setup:latest
    restart: unless-stopped
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-change-me-astra}
      - POSTGRES_SEEDS=temporal-postgres
      - TEMPORAL_NAMESPACES=astra
      - TEMPORAL_HISTORY_RETENTION_IN_DAYS=3
    depends_on:
      temporal-postgres:
        condition: service_healthy
    mem_limit: 1g
    memswap_limit: 1g
    pids_limit: 256
    healthcheck:
      test: ["CMD-SHELL", "tctl --address temporal:7233 cluster health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # LiteLLM proxy gateway (Wave 5.1, PLAN.md target path: Astra -> LiteLLM ->
  # Headroom -> OpenRouter). Gated behind astra_model_gateway_v2; the direct
  # OpenRouter path (backend/core/factory.py) keeps working unchanged when a
  # run's feature_assignment has it off. Uses the `litellm` database already
  # provisioned on temporal-postgres by deploy/temporal-postgres-init.
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:${TEMPORAL_DB_PASSWORD:-change-me-astra}@temporal-postgres:5432/litellm
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-}
      - LITELLM_ORG_KEYS_JSON=${LITELLM_ORG_KEYS_JSON:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ./deploy/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      temporal-postgres:
        condition: service_healthy
    mem_limit: 2g
    memswap_limit: 2g
    pids_limit: 256
    healthcheck:
      # Same /dev/tcp connect-check as crw/lightpanda -- the litellm image has
      # no wget/curl either.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/4000'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
  temporal-ui:
    image: temporalio/ui:latest
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    depends_on:
      temporal:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"

  temporal-worker:
    build:
      context: .
      dockerfile: Dockerfile.temporal-worker
    restart: unless-stopped
    # ExecuteOrchestratorActivity runs the full legacy orchestrator (get_orchestrator())
    # in-process inside this worker -- it needs the same Supabase/model-routing config
    # as the backend service, not just Temporal's own address/namespace. Without
    # env_file, every Supabase-touching activity (publish_event, update_run_status,
    # observe_run) silently no-ops with "supabase_url is required" and any real
    # orchestrator run fails outright once it needs a provider call.
    env_file: .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=astra
      - REDIS_URL=redis://redis:6379
      - OBSIDIAN_VAULT=/data/astra_docs
      - ASTRA_WORKSPACE=/data/astra-workspaces
      - AGENT_MODEL_BASE_URL=http://headroom:8787/v1
      - OPENROUTER_BASE_URL=http://headroom:8787/v1
      - TOOLUSE_MODEL_BASE_URL=http://headroom:8787/v1
      - PLANNER_MODEL_BASE_URL=http://headroom:8787/v1
      - CHAT_MODEL_BASE_URL=http://headroom:8787/v1
      - LIGHT_MODEL_BASE_URL=http://headroom:8787/v1
      - CRW_BASE_URL=http://crw:3000
      - HIGHOUTPUT_MODEL_BASE_URL=http://headroom:8787/v1
    depends_on:
      temporal:
        condition: service_healthy
      redis:
        condition: service_healthy
      headroom:
        condition: service_healthy
    # Was 512m -- too small now that this container runs the same
    # get_orchestrator() code path backend does (backend needs 4g for it).
    # Bumped again 2g->4g: BAAI/bge-large-en-v1.5 (local Graphiti embedder,
    # graphiti_adapter.py's OpenRouter-fallback path) loads real torch model
    # weights into memory once per process and stays resident.
    mem_limit: 4g
    memswap_limit: 4g
    pids_limit: 256
    volumes:
      - astra_docs_data:/data/astra_docs
      - astra_workspaces_data:/data/astra-workspaces
      - brain_data:/app/.astra

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx-app-locations.conf:/etc/nginx/app-locations.conf:ro
      - ./deploy/certs:/etc/nginx/certs
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    command: >-
      /bin/sh -c 'mkdir -p /etc/nginx/certs;
      if [ -f /etc/letsencrypt/live/178.105.231.73.nip.io/fullchain.pem ]; then
        cp /etc/letsencrypt/live/178.105.231.73.nip.io/fullchain.pem /etc/nginx/certs/tls.crt;
        cp /etc/letsencrypt/live/178.105.231.73.nip.io/privkey.pem /etc/nginx/certs/tls.key;
      fi;
      if [ -f /etc/letsencrypt/live/app.astracreates.com/fullchain.pem ]; then
        cp /etc/letsencrypt/live/app.astracreates.com/fullchain.pem /etc/nginx/certs/app.tls.crt;
        cp /etc/letsencrypt/live/app.astracreates.com/privkey.pem /etc/nginx/certs/app.tls.key;
      fi;
      if [ -f /etc/letsencrypt/live/api.astracreates.com/fullchain.pem ]; then
        cp /etc/letsencrypt/live/api.astracreates.com/fullchain.pem /etc/nginx/certs/api.tls.crt;
        cp /etc/letsencrypt/live/api.astracreates.com/privkey.pem /etc/nginx/certs/api.tls.key;
      fi;
      if [ ! -s /etc/nginx/certs/tls.crt ] || [ ! -s /etc/nginx/certs/tls.key ]; then
        openssl req -x509 -nodes -newkey rsa:2048 -days 1 -subj /CN=bootstrap.invalid -keyout /etc/nginx/certs/tls.key -out /etc/nginx/certs/tls.crt;
      fi;
      if [ ! -s /etc/nginx/certs/app.tls.crt ] || [ ! -s /etc/nginx/certs/app.tls.key ]; then
        cp /etc/nginx/certs/tls.crt /etc/nginx/certs/app.tls.crt;
        cp /etc/nginx/certs/tls.key /etc/nginx/certs/app.tls.key;
      fi;
      if [ ! -s /etc/nginx/certs/api.tls.crt ] || [ ! -s /etc/nginx/certs/api.tls.key ]; then
        cp /etc/nginx/certs/tls.crt /etc/nginx/certs/api.tls.crt;
        cp /etc/nginx/certs/tls.key /etc/nginx/certs/api.tls.key;
      fi;
      exec nginx -g "daemon off;"'
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Issues/renews the TLS cert for 178.105.231.73.nip.io (the only real
  # hostname pointing at this box — astracreates.com's DNS is on Vercel).
  # Not a long-running service: invoked manually via
  # `docker compose run --rm certbot ...` for issuance, and by a host
  # crontab entry for renewal.
  certbot:
    image: certbot/certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot

volumes:
  redis_data:
  astra_docs_data:
  astra_workspaces_data:
  brain_data:
  windmill_db_data:
  windmill_worker_cache:
  windmill_worker_logs:
  temporal_pg_data:
