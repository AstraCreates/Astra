services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - OBSIDIAN_VAULT=/data/astra_docs
      - ASTRA_WORKSPACE=/data/astra-workspaces
    depends_on:
      - redis
    ports:
      - "8000:8000"
      - "4000-4009:4000-4009"  # local MVP preview servers (Vercel fallback)
    volumes:
      - ./backend:/app/backend  # live code mount — SCP + restart, no rebuild needed
      - astra_docs_data:/data/astra_docs
      - astra_workspaces_data:/data/astra-workspaces
      - brain_data:/app/.astra

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - BACKEND_URL=http://backend:8000
        - NEXT_PUBLIC_API_URL=/api
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
        - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
        - NEXTAUTH_URL=${NEXTAUTH_URL:-}
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
    restart: unless-stopped
    env_file: .env
    environment:
      - BACKEND_URL=http://backend:8000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_HOST=178.105.231.73.nip.io
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_PATH=/n8n/
      - WEBHOOK_URL=https://178.105.231.73.nip.io/n8n/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-astra}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD must be set}
      - N8N_SECURE_COOKIE=true
      - DB_TYPE=sqlite
      - N8N_USER_FOLDER=/home/node/.n8n
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - default

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx-app-locations.conf:/etc/nginx/app-locations.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

  # Issues/renews the TLS cert for 178.105.231.73.nip.io (the only real
  # hostname pointing at this box — astracreates.com's DNS is on Vercel).
  # Not a long-running service: invoked manually via
  # `docker compose run --rm certbot ...` for issuance, and by a host
  # crontab entry for renewal.
  certbot:
    image: certbot/certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot

volumes:
  redis_data:
  astra_docs_data:
  astra_workspaces_data:
  brain_data:
  n8n_data:
