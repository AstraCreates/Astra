services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - OBSIDIAN_VAULT=/data/astra_docs
      - ASTRA_WORKSPACE=/data/astra-workspaces
    depends_on:
      - redis
    ports:
      - "127.0.0.1:8000:8000"
      - "4000-4009:4000-4009"  # local MVP preview servers (Vercel fallback) — intentionally public, see deploy/nginx.conf
    volumes:
      - ./backend:/app/backend  # live code mount — SCP + restart, no rebuild needed
      - astra_docs_data:/data/astra_docs
      - astra_workspaces_data:/data/astra-workspaces
      - brain_data:/app/.astra

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - BACKEND_URL=http://backend:8000
        - NEXT_PUBLIC_API_URL=/api
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
        - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
        - NEXTAUTH_URL=${NEXTAUTH_URL:-}
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
    restart: unless-stopped
    env_file: .env
    environment:
      - BACKEND_URL=http://backend:8000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"

  windmill-db:
    image: postgres:16
    restart: unless-stopped
    shm_size: 1g
    environment:
      - POSTGRES_PASSWORD=${WM_DB_PASSWORD:-change-me-astra}
      - POSTGRES_DB=windmill
    volumes:
      - windmill_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  windmill-server:
    image: ${WM_IMAGE:-ghcr.io/windmill-labs/windmill:main}
    restart: unless-stopped
    depends_on:
      windmill-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${WM_DATABASE_URL:-postgres://postgres:${WM_DB_PASSWORD:-change-me-astra}@windmill-db/windmill?sslmode=disable}
      - MODE=server
    volumes:
      - windmill_worker_logs:/tmp/windmill/logs

  windmill-worker:
    image: ${WM_IMAGE:-ghcr.io/windmill-labs/windmill:main}
    restart: unless-stopped
    privileged: true
    depends_on:
      windmill-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${WM_DATABASE_URL:-postgres://postgres:${WM_DB_PASSWORD:-change-me-astra}@windmill-db/windmill?sslmode=disable}
      - MODE=worker
      - WORKER_GROUP=default
      - FAVOR_UNSHARE_PID=true
    volumes:
      - windmill_worker_cache:/tmp/windmill/cache
      - windmill_worker_logs:/tmp/windmill/logs

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx-app-locations.conf:/etc/nginx/app-locations.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

  # Issues/renews the TLS cert for 178.105.231.73.nip.io (the only real
  # hostname pointing at this box — astracreates.com's DNS is on Vercel).
  # Not a long-running service: invoked manually via
  # `docker compose run --rm certbot ...` for issuance, and by a host
  # crontab entry for renewal.
  certbot:
    image: certbot/certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot

volumes:
  redis_data:
  astra_docs_data:
  astra_workspaces_data:
  brain_data:
  windmill_db_data:
  windmill_worker_cache:
  windmill_worker_logs:
