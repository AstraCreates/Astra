# Wave 5.1 LiteLLM proxy config (Astra -> LiteLLM -> Headroom -> OpenRouter).
#
# model_name values are the literal OpenRouter model strings Astra already
# sends as `model=` in backend/core/agent.py (self.model, sourced from the
# *_model_name / *_model settings in backend/config.py) -- keep this list in
# sync with backend/control_plane/gateway.py::normalize_model_alias, which
# must resolve to names declared here. All routes go through OpenRouter;
# Headroom stays a separate, upstream compression hop and is not configured
# here (backend points AGENT_MODEL_BASE_URL/OPENROUTER_BASE_URL at Headroom
# already -- LiteLLM calls OpenRouter directly, same as the direct path does
# today via backend/core/factory.py).
model_list:
  - model_name: deepseek/deepseek-v4-flash
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_base: os.environ/OPENROUTER_BASE_URL
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: deepseek/deepseek-v4-pro
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-pro
      api_base: os.environ/OPENROUTER_BASE_URL
