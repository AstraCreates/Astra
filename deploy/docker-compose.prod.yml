services:
  redis:
    image: redis:7-alpine
    container_name: astra-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: backend
    restart: unless-stopped
    env_file: ../.env
    environment:
      - REDIS_URL=redis://redis:6379
      - OBSIDIAN_VAULT=/data/astra_docs
      - ASTRA_WORKSPACE=/data/astra-workspaces
    depends_on:
      - redis
    ports:
      - "8000:8000"
      - "4000-4009:4000-4009"
    volumes:
      - astra_docs_data:/data/astra_docs
      - astra_workspaces_data:/data/astra-workspaces
      - brain_data:/app/.astra

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
      args:
        BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_API_URL: /api
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
    container_name: frontend
    restart: unless-stopped
    env_file: ../.env
    environment:
      - BACKEND_URL=http://backend:8000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: astra-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  redis_data:
  astra_docs_data:
  astra_workspaces_data:
  brain_data:
