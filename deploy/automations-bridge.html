<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Loading…</title></head>
<body style="margin:0;background:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#888;">
  <div>Loading automations…</div>
  <script>
    // Same-origin bridge: the parent (Astra) page postMessages a fresh
    // Activepieces session token into this iframe. Being same-origin with
    // the automations app, this page CAN write to its localStorage — the
    // parent page, on a different origin, cannot do that directly. Once
    // stored, redirect into the real app already logged in.
    var ALLOWED_ORIGINS = [
      "https://178.105.231.73.nip.io",
      "https://astracreates.com",
      "https://www.astracreates.com"
    ];

    window.addEventListener("message", function (event) {
      if (ALLOWED_ORIGINS.indexOf(event.origin) === -1) return;
      if (!event.data || event.data.type !== "astra-automations-auth" || !event.data.token) return;
      try {
        window.localStorage.setItem("token", event.data.token);
      } catch (e) {
        return;
      }
      window.location.href = "/";
    });

    if (window.parent !== window) {
      window.parent.postMessage({ type: "astra-automations-bridge-ready" }, "*");
    }
  </script>
</body>
</html>
