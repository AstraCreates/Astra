# Shared location blocks for the main app (frontend/backend/n8n).
# Included by both the plain-HTTP catch-all server and the HTTPS server for
# 178.105.231.73.nip.io — keeps the two in sync without duplicating routes.

client_max_body_size 25m;

# ACME HTTP-01 challenge webroot (cert issuance/renewal for
# 178.105.231.73.nip.io — the only real hostname pointing at this box).
location /.well-known/acme-challenge/ {
    root /var/www/certbot;
}

# WebSocket — LLC filer, GitHub connect, openclaude terminal takeover, any ws://
location ~ ^/(api/)?(llc|connect|terminal)/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Terminals idle between keystrokes — keep the socket open for an hour.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

# SSE — long timeout + no buffering
location ~ ^/(api/)?(stream|events|sse|web-navigator/stream)/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Astra-User-Id $http_x_astra_user_id;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 900s;
    add_header X-Accel-Buffering no;
}

# Goal endpoint — long timeout for agent runs. Anchor the path so it matches
# /goal and /goal/continue but NOT the frontend /goals page.
location ~ ^/(api/)?goal(/|$) {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
}

# NextAuth — must go to frontend, not backend
location /api/auth/ {
    proxy_pass http://frontend/api/auth/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

# Desktop app download — Next.js API route, must go to frontend, not backend
location /api/downloads/ {
    proxy_pass http://frontend/api/downloads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

location /api/ {
    limit_req zone=api burst=20 nodelay;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
}

# n8n visual workflow editor. n8n's Express app mounts all routes
# (static assets, REST, websocket) at "/" regardless of N8N_PATH —
# that var only rewrites the URLs written into index.html. So nginx
# must strip the /n8n prefix before proxying, or every asset/rest
# request 404s into n8n's SPA history fallback.
location = /n8n {
    return 301 /n8n/;
}

location /n8n/ {
    rewrite ^/n8n/(.*)$ /$1 break;
    proxy_pass http://n8n;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_buffering off;
}

location / {
    proxy_pass http://frontend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}
