worker_processes auto;
events { worker_connections 4096; }

http {
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    resolver 127.0.0.11 valid=10s ipv6=off;
    upstream backend {
        zone backend_zone 64k;
        server backend:8000 resolve;
        keepalive 64;
    }

    upstream frontend {
        zone frontend_zone 64k;
        server frontend:3000 resolve;
        keepalive 32;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Company preview subdomains: {slug}.178.105.231.73.nip.io → backend preview proxy
    server {
        listen 80;
        server_name ~^[a-z0-9][-a-z0-9]*\.178\.105\.231\.73\.nip\.io;

        client_max_body_size 10m;

        location / {
            proxy_pass http://backend/preview-route$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
            proxy_buffering off;
        }
    }

    server {
        listen 80;
        server_name api.astracreates.com;

        client_max_body_size 25m;

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_read_timeout 900s;
        }
    }

    # Plain-HTTP entry point — bare IP + astracreates.com/www. Note
    # astracreates.com's DNS actually points at Vercel, not this box; this
    # block only ever sees traffic for it if something is misconfigured.
    # Kept as the default_server so bare-IP access still works unencrypted.
    server {
        listen 80 default_server;
        server_name astracreates.com www.astracreates.com _;

        include /etc/nginx/app-locations.conf;
    }

    # 178.105.231.73.nip.io is the one hostname Let's Encrypt could issue a
    # cert for here (it resolves to this box; astracreates.com does not).
    # Redirect its plain-HTTP traffic to HTTPS, but keep the ACME webroot
    # reachable over HTTP for renewal.
    server {
        listen 80;
        server_name 178.105.231.73.nip.io;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Public Company Home hostname. Keep HTTP available only for ACME; all
    # application traffic moves to HTTPS once the app certificate is issued.
    server {
        listen 80;
        server_name app.astracreates.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name 178.105.231.73.nip.io;

        # A self-signed bootstrap certificate is created on a fresh host so
        # nginx can start and serve the HTTP-01 challenge before issuance.
        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        include /etc/nginx/app-locations.conf;
    }

    server {
        listen 443 ssl;
        server_name app.astracreates.com;

        ssl_certificate     /etc/nginx/certs/app.tls.crt;
        ssl_certificate_key /etc/nginx/certs/app.tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        include /etc/nginx/app-locations.conf;
    }

}
