worker_processes auto;
events { worker_connections 4096; }

http {
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    upstream backend {
        server backend:8000;
        keepalive 64;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream n8n {
        server n8n:5678;
        keepalive 16;
    }

    upstream automations {
        server automations:80;
        keepalive 16;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Company preview subdomains: {slug}.178.105.231.73.nip.io → backend preview proxy
    server {
        listen 80;
        server_name ~^[a-z0-9][-a-z0-9]*\.178\.105\.231\.73\.nip\.io;

        client_max_body_size 10m;

        location / {
            proxy_pass http://backend/preview-route$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
            proxy_buffering off;
        }
    }

    server {
        listen 80;
        server_name api.astracreates.com;

        client_max_body_size 25m;

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_read_timeout 900s;
        }
    }

    # Plain-HTTP entry point — bare IP + astracreates.com/www. Note
    # astracreates.com's DNS actually points at Vercel, not this box; this
    # block only ever sees traffic for it if something is misconfigured.
    # Kept as the default_server so bare-IP access still works unencrypted.
    server {
        listen 80 default_server;
        server_name astracreates.com www.astracreates.com _;

        include /etc/nginx/app-locations.conf;
    }

    # 178.105.231.73.nip.io is the one hostname Let's Encrypt could issue a
    # cert for here (it resolves to this box; astracreates.com does not).
    # Redirect its plain-HTTP traffic to HTTPS, but keep the ACME webroot
    # reachable over HTTP for renewal.
    server {
        listen 80;
        server_name 178.105.231.73.nip.io;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name 178.105.231.73.nip.io;

        ssl_certificate     /etc/letsencrypt/live/178.105.231.73.nip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/178.105.231.73.nip.io/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        include /etc/nginx/app-locations.conf;
    }

    # Automations builder, on its own subdomain rather than a subpath — SPAs
    # like this one tend to hardcode asset paths at the origin root (n8n did
    # exactly this under /n8n/, see the comment history there), so a fresh
    # origin sidesteps that whole bug class instead of prefix-stripping.
    server {
        listen 80;
        server_name automations.178.105.231.73.nip.io;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name automations.178.105.231.73.nip.io;

        ssl_certificate     /etc/letsencrypt/live/178.105.231.73.nip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/178.105.231.73.nip.io/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 25m;

        # Community Edition has no invite-only mode — anyone who finds this
        # URL can self-register a free account (confirmed live: a probe
        # signup succeeded and was immediately deleted). Block the public
        # signup endpoint at the edge until account provisioning is driven
        # from Astra's backend instead. Sign-in is untouched.
        location = /api/v1/authentication/sign-up {
            return 403;
        }

        # Same-origin SSO bridge — see automations_bridge.py / AutomationsView
        # for why this exists instead of Activepieces' Enterprise-only embed-sdk.
        location = /astra-bridge.html {
            root /etc/nginx/static;
        }

        location / {
            proxy_pass http://automations;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_buffering off;

            # App ships frame-ancestors 'self' by default, which blocks being
            # iframed by our own frontend (a different origin). We're choosing
            # to allow exactly our own trusted origins here, not disabling
            # clickjacking protection broadly.
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors 'self' https://178.105.231.73.nip.io https://astracreates.com https://www.astracreates.com" always;
        }
    }
}
