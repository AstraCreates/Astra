worker_processes auto;
events { worker_connections 4096; }

http {
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    upstream backend {
        server backend:8000;
        keepalive 64;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Company preview subdomains: {slug}.178.105.231.73.nip.io → backend preview proxy
    server {
        listen 80;
        server_name ~^[a-z0-9][-a-z0-9]*\.178\.105\.231\.73\.nip\.io;

        client_max_body_size 10m;

        location / {
            proxy_pass http://backend/preview-route$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
            proxy_buffering off;
        }
    }

    server {
        listen 80;
        server_name api.astracreates.com;

        client_max_body_size 25m;

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_read_timeout 900s;
        }
    }

    server {
        listen 80 default_server;
        server_name astracreates.com www.astracreates.com _;

        # Allow large uploads (e.g. Google Contacts CSV exports).
        client_max_body_size 25m;

        # WebSocket — LLC filer, GitHub connect, openclaude terminal takeover, any ws://
        location ~ ^/(api/)?(llc|connect|terminal)/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Terminals idle between keystrokes — keep the socket open for an hour.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # SSE — long timeout + no buffering
        location ~ ^/(api/)?(stream|events|sse|web-navigator/stream)/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Astra-User-Id $http_x_astra_user_id;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 900s;
            add_header X-Accel-Buffering no;
        }

        # Goal endpoint — long timeout for agent runs. Anchor the path so it matches
        # /goal and /goal/continue but NOT the frontend /goals page.
        location ~ ^/(api/)?goal(/|$) {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 600s;
        }

        # NextAuth — must go to frontend, not backend
        location /api/auth/ {
            proxy_pass http://frontend/api/auth/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # Desktop app download — Next.js API route, must go to frontend, not backend
        location /api/downloads/ {
            proxy_pass http://frontend/api/downloads/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 60s;
        }
    }
}
